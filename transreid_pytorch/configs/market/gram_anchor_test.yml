MODEL:
  PRETRAIN_HW_RATIO: 2
  PRETRAIN_CHOICE: ''
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  TRANSFORMER_TYPE: 'vit_small_patch16_224_TransReID'
  STRIDE_SIZE: [16, 16]
  USE_GRAM_ANCHOR_LOSS: True
  GRAM_ANCHOR_LOSS_WEIGHT: 1.0
  GRAM_ANCHOR_DINO_MODEL: 'dinov3-vits16-pretrain'
  GRAM_ANCHOR_STUDENT_DIM: 384
  GRAM_ANCHOR_TEACHER_DIM: 384

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5
  RE_PROB: 0.5
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  NAMES: ('market1501')
  ROOT_DIR: ('D:/ViSoura/training-pipeline/Dataset/ReID-Data')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 1
  BASE_LR: 0.0004
  WARMUP_EPOCHS: 1
  IMS_PER_BATCH: 16
  WARMUP_METHOD: 'cosine'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 1
  LOG_PERIOD: 1
  EVAL_PERIOD: 1
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: False
  IMS_PER_BATCH: 16
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

OUTPUT_DIR: './logs/gram_anchor_test'
