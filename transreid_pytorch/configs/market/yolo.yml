MODEL:
  NAME: 'yolo'
  PRETRAIN_CHOICE: ''   # ultralytics loads its own pretrained weights (via YOLO.WEIGHTS)
  YOLO:
    WEIGHTS: 'yolo11n-seg.pt'     # set to your model: yolo11n.pt / yolo11n-seg.pt / yolo11n-cls.pt
    TASK: 'segment'             # 'auto' | 'detect' | 'segment' | 'classify'
    FUSION: 'gap_concat'     # 'gap_concat' | 'deepest' | 'upsample_concat'
    FEATURE_LAYERS: []       # optional explicit layer indices; [] = head input maps
    FREEZE_BACKBONE: False
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NO_MARGIN: True
  DEVICE_ID: ('0')
  # Guided attention / Gram-Anchor are ViT-internal and do not apply to a CNN backbone
  GUIDED_ATTENTION_TRAIN: False
  GUIDED_ATTENTION_TEST: False
  USE_GRAM_ANCHOR_LOSS: False
  # KoLeo operates on the global feature and works with any backbone
  USE_KOLEO_LOSS: False
  KOLEO_LOSS_WEIGHT: 0.1

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  NAMES: ('market1501')
  ROOT_DIR: ('/home/wahdan/Desktop/GP/guided_attention_experiments/Data')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.0004
  WARMUP_EPOCHS: 20
  IMS_PER_BATCH: 64
  WARMUP_METHOD: 'cosine'
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 120
  LOG_PERIOD: 20
  EVAL_PERIOD: 120
  WEIGHT_DECAY:  1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 16
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'None'

OUTPUT_DIR: '/home/wahdan/Desktop/GP/guided_attention_experiments/transreid_pytorch/logs/yolo_market'
